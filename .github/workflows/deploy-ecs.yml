name: Deploy ECS Fargate

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: video-script-creator-ecs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      APP_NAME: video-script-creator
      APP_RUNTIME: ${{ vars.APP_RUNTIME || 'api' }}
      APP_BASE_PATH: ''
      PUBLIC_APP_URL: ${{ vars.PUBLIC_APP_URL || 'https://videoscript.hisense.com' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
      BEDROCK_AWS_REGION: ${{ vars.BEDROCK_AWS_REGION || 'eu-central-1' }}
      BEDROCK_MODEL_ID: eu.anthropic.claude-sonnet-4-5-20250929-v1:0
      BEDROCK_MODEL_FALLBACK_IDS: eu.amazon.nova-pro-v1:0
      BEDROCK_MAX_TOKENS: '8192'
      BEDROCK_FALLBACK_MAX_TOKENS: '4096'
      STORAGE_BACKEND: ${{ vars.STORAGE_BACKEND || 's3' }}
      S3_BUCKET: ${{ vars.S3_BUCKET || 'video-script-creator-prod-assets-625093290485' }}
      S3_PREFIX: ${{ vars.S3_PREFIX || 'runtime' }}
      NOVA_REEL_AWS_REGION: ${{ vars.NOVA_REEL_AWS_REGION || 'us-east-1' }}
      NOVA_REEL_MODEL_ID: ${{ vars.NOVA_REEL_MODEL_ID || 'amazon.nova-reel-v1:1' }}
      NOVA_REEL_OUTPUT_S3_URI: ${{ vars.NOVA_REEL_OUTPUT_S3_URI || 's3://video-script-creator-prod-assets-625093290485/runtime/nova-reel-poc' }}
      NOVA_REEL_ESTIMATED_USD_PER_SECOND: ${{ vars.NOVA_REEL_ESTIMATED_USD_PER_SECOND || '0.08' }}
      NOVA_REEL_MAX_SUBMISSIONS_PER_CLICK: ${{ vars.NOVA_REEL_MAX_SUBMISSIONS_PER_CLICK || '2' }}
      NOVA_CANVAS_AWS_REGION: ${{ vars.NOVA_CANVAS_AWS_REGION || 'us-west-2' }}
      NOVA_CANVAS_MODEL_ID: ${{ vars.NOVA_CANVAS_MODEL_ID || 'stability.sd3-5-large-v1:0' }}
      NOVA_CANVAS_ESTIMATED_USD_PER_IMAGE: ${{ vars.NOVA_CANVAS_ESTIMATED_USD_PER_IMAGE || '0.08' }}
      RAINFOREST_API_KEY_SECRET_ARN: ${{ secrets.RAINFOREST_API_KEY_SECRET_ARN }}
      RAINFOREST_DEFAULT_AMAZON_DOMAIN: ${{ vars.RAINFOREST_DEFAULT_AMAZON_DOMAIN || 'amazon.com' }}
      RAINFOREST_SEARCH_TOP_N: ${{ vars.RAINFOREST_SEARCH_TOP_N || '8' }}
      RAINFOREST_DISCOVERY_REQUEST_LIMIT: ${{ vars.RAINFOREST_DISCOVERY_REQUEST_LIMIT || '6' }}
      RAINFOREST_MAX_PRODUCTS_PER_REFRESH: ${{ vars.RAINFOREST_MAX_PRODUCTS_PER_REFRESH || '30' }}
      YOUTUBE_API_KEY_SECRET_ARN: ${{ secrets.YOUTUBE_API_KEY_SECRET_ARN }}
      YOUTUBE_DISCOVERY_TOP_N: ${{ vars.YOUTUBE_DISCOVERY_TOP_N || '8' }}
      YOUTUBE_DISCOVERY_REQUEST_LIMIT: ${{ vars.YOUTUBE_DISCOVERY_REQUEST_LIMIT || '4' }}
      SOCIAL_OEMBED_ACCESS_TOKEN_SECRET_ARN: ${{ secrets.SOCIAL_OEMBED_ACCESS_TOKEN_SECRET_ARN }}
      SOCIAL_REQUEST_TIMEOUT: ${{ vars.SOCIAL_REQUEST_TIMEOUT || '15' }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      APP_ACCESS_PASSWORD_SECRET_ARN: ${{ secrets.APP_ACCESS_PASSWORD_SECRET_ARN }}
      DATABASE_URL_SECRET_ARN: ${{ secrets.DATABASE_URL_SECRET_ARN }}
      APP_ACCESS_PASSWORD_CACHE_TTL: ${{ vars.APP_ACCESS_PASSWORD_CACHE_TTL || '300' }}
      ALLOWED_HTTP_CIDRS: ${{ vars.ALLOWED_HTTP_CIDRS || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip until AWS role is configured
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' }}
        run: |
          echo "AWS_ROLE_TO_ASSUME is not configured. Skipping deployment."
          echo "See docs/github-actions-auto-deploy.md for one-time setup."

      - name: Configure AWS credentials
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        run: aws sts get-caller-identity

      - name: Deploy ECS service
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        run: bash scripts/deploy_ecs_fargate.sh

      - name: Ensure production HTTPS redirect
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        run: |
          alb_arn="$(aws elbv2 describe-load-balancers --region "$AWS_REGION" --names "${APP_NAME}-alb" --query "LoadBalancers[0].LoadBalancerArn" --output text)"
          listener_80="$(aws elbv2 describe-listeners --region "$AWS_REGION" --load-balancer-arn "$alb_arn" --query "Listeners[?Port==\`80\`].ListenerArn | [0]" --output text)"
          listener_443="$(aws elbv2 describe-listeners --region "$AWS_REGION" --load-balancer-arn "$alb_arn" --query "Listeners[?Port==\`443\`].ListenerArn | [0]" --output text)"
          if [ "$listener_80" != "None" ] && [ -n "$listener_80" ] && [ "$listener_443" != "None" ] && [ -n "$listener_443" ]; then
            aws elbv2 modify-listener \
              --region "$AWS_REGION" \
              --listener-arn "$listener_80" \
              --default-actions 'Type=redirect,RedirectConfig={Protocol=HTTPS,Port=443,StatusCode=HTTP_301}'
          fi

      - name: Show ECS status
        if: ${{ always() && env.AWS_ROLE_TO_ASSUME != '' }}
        run: bash scripts/ecs_status.sh || true