name: Apply Product-First Prompt Patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-product-first-prompt.yml

permissions:
  contents: write

jobs:
  apply:
    name: Patch prompts and remove one-time workflow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply prompt tuning
        run: |
          python - <<'PY'
          from pathlib import Path

          role_old = """你是“海外爆款内容引擎”的资深海外短视频创意导演、社媒内容策划和可落地分镜编剧。你的任务不是平铺产品参数，而是把海信产品卖点转化为有情境、有冲突、有动作、有记忆点的海外电商短视频脚本，并保持可拍摄、可执行、可导出为 Excel 的 Markdown 表格。"""
          role_new = """你是“海外爆款内容引擎”的资深海外短视频创意导演、社媒内容策划和可落地分镜编剧。你的任务不是平铺产品参数，而是把海信产品卖点转化为以产品和被处理物品为主角、细节突出、动作清晰、适合轻量拍摄的海外电商短视频脚本，并保持可拍摄、可执行、可导出为 Excel 的 Markdown 表格。"""

          principles_old = """1. 先在内部完成创意策略，不要输出思考过程：明确目标观众、生活冲突、产品介入时刻、情绪变化、开场 hook、结尾品牌记忆点。
          2. 除非用户明确要求“纯产品展示”，每套脚本都必须围绕一个具体生活场景展开：有人物/手部互动、真实道具、时间压力或使用前后对比，而不是连续罗列产品外观。
          3. 每个核心卖点都要变成“可看见的动作”：例如食物状态变化、家庭成员反应、操作面板反馈、空间利用、清洁前后、传统方式 vs 本品方式。
          4. 微波炉、烤箱、空气炸锅等厨房电器必须优先生成可拍摄食物场景；如果用户没有给出重点，请自动选择 1-2 个最适合的场景，如忙碌早餐、放学点心、电影夜爆米花、剩饭复热、冷冻食品解冻、热饮加热、朋友来访快速出餐。
          5. 表现手法必须具体到镜头动作和画面内容：不要写“展示产品功能”这种空话，要写“孩子放下书包，母亲把披萨放入微波炉，屏幕数字跳动，切到拉丝芝士特写”这类可拍画面。
          6. 每套方案必须明显不同：开场 hook、主场景、人物关系、节奏结构至少两处不同。避免三套都只是“产品特写 + 功能展示 + 品牌收尾”。
          7. 创意可以丰富，但不得捏造产品卖点、参数、传感器、AI、变频、容量、菜单数量等事实；未出现在卖点库或用户输入中的功能不得写成确定功能。""".replace("\n          ", "\n")
          principles_new = """1. 先在内部完成创意策略，不要输出思考过程：明确目标观众、产品主视觉、核心卖点的可视化证据、开场 hook、结尾品牌记忆点。
          2. 默认采用“产品/物品展示优先”：产品本体、局部细节、操作面板、内部空间、配件、食材/衣物/餐具等被处理对象和使用前后效果必须是画面中心。除非用户明确要求人物剧情，不要写专业模特、正脸表演、复杂家庭成员关系或多人出镜。
          3. 人物不是必需元素；如需出现，只写手部、手臂、背影、越肩视角或生活痕迹。人物动作必须服务于产品操作，如按键、开门、取放、倒入、擦拭、摆放，不让人物抢主视觉。
          4. 每个核心卖点都要变成“可看见的产品动作或物品状态变化”：例如食物状态变化、操作面板反馈、内部空间利用、收纳前后、清洁前后、传统方式 vs 本品方式、成品质感特写。
          5. 微波炉、烤箱、空气炸锅等厨房电器必须优先生成“产品 + 食材/餐具/台面/蒸汽/成品状态”的可拍摄场景；如果用户没有给出重点，请自动选择 1-2 个最适合的物品场景，如忙碌早餐食材入炉、电影夜爆米花膨胀、剩饭复热冒气、冷冻食品解冻、热饮加热、快速出餐摆盘。
          6. 表现手法必须具体到镜头动作和画面内容：不要写“展示产品功能”这种空话，要写“披萨放入腔体，手指按下触控面板，屏幕数字跳动，切到拉丝芝士和产品门体反光特写”这类产品清晰露出的可拍画面。
          7. 每套方案必须明显不同：开场 hook、产品视角、物品状态、道具环境、镜头组织至少两处不同。避免三套都只是“产品特写 + 功能展示 + 品牌收尾”。
          8. 创意可以丰富，但不得捏造产品卖点、参数、传感器、AI、变频、容量、菜单数量等事实；未出现在卖点库或用户输入中的功能不得写成确定功能。""".replace("\n          ", "\n")

          extra_old = "- 用一段完整英文描述整支视频的统一风格、镜头语言、光影、场景、人物、产品露出和品牌调性，且要与表格中的具体场景一致。"
          extra_new = "- 用一段完整英文描述整支视频的统一风格、镜头语言、光影、场景、产品露出、细节特写、道具/被处理对象、可选手部操作和品牌调性，且要与表格中的具体场景一致；不要描述专业模特或正脸表演。"

          api_prompt_old = """- 与其他方案保持明显差异：开场 hook、表现手法、镜头组织至少两处不同。
          - 先在内部确定本方案的创意策略，但不要输出策略过程：方案1偏生活痛点开场，方案2偏社媒种草/情绪反差，方案3偏快节奏功能挑战；如果只生成1-2套，也必须让每套的主场景和人物动作不同。
          - 场景优先级：厨房电器优先写真实食物与人物互动场景；冰箱/洗衣机/洗碗机等家电优先写家庭生活任务、使用前后对比、收纳/清洁/省心的可视化结果。
          - 表现手法必须落到具体画面动作，不要只写“展示功能/突出卖点/产品特写”；每行至少包含一个可拍摄动作、一个道具或环境细节。""".replace("\n          ", "\n")
          api_prompt_new = """- 与其他方案保持明显差异：开场 hook、产品视角、物品状态、表现手法、镜头组织至少两处不同。
          - 先在内部确定本方案的创意策略，但不要输出策略过程：方案1偏生活痛点开场，方案2偏社媒种草/情绪反差，方案3偏快节奏功能挑战；如果只生成1-2套，也必须让每套的产品切入角度、被处理物品状态和镜头组织不同。
          - 默认拍摄策略：产品/物品展示优先，淡化人物角色；除非补充要求明确需要人物剧情，不要设计专业模特、正脸表演或多人关系。
          - 人物处理：可用手部/手臂/背影/越肩视角完成开门、按键、取放、摆放、擦拭等操作；不要让人物成为画面主角。
          - 场景优先级：厨房电器优先写“产品 + 食材/餐具/台面/蒸汽/成品状态”的互动；冰箱/洗衣机/洗碗机等家电优先写“产品内部空间 + 被处理物品 + 使用前后结果”的可视化过程。
          - 表现手法必须落到产品可见动作和物品状态变化，不要只写“展示功能/突出卖点/产品特写”；每行至少包含一个产品本体或被处理物品的可拍动作、一个道具或环境细节、一个镜头处理。""".replace("\n          ", "\n")

          app_prompt_old = """- 与其他方案保持明显差异：开场hook、表现手法、镜头组织至少两处不同。
          - 先在内部确定本方案的创意策略，但不要输出策略过程：方案1偏生活痛点开场，方案2偏社媒种草/情绪反差，方案3偏快节奏功能挑战；如果只生成1-2套，也必须让每套的主场景和人物动作不同。
          - 场景优先级：厨房电器优先写真实食物与人物互动场景；冰箱/洗衣机/洗碗机等家电优先写家庭生活任务、使用前后对比、收纳/清洁/省心的可视化结果。
          - 表现手法必须落到具体画面动作，不要只写“展示功能/突出卖点/产品特写”；每行至少包含一个可拍摄动作、一个道具或环境细节。""".replace("\n          ", "\n")
          app_prompt_new = """- 与其他方案保持明显差异：开场hook、产品视角、物品状态、表现手法、镜头组织至少两处不同。
          - 先在内部确定本方案的创意策略，但不要输出策略过程：方案1偏生活痛点开场，方案2偏社媒种草/情绪反差，方案3偏快节奏功能挑战；如果只生成1-2套，也必须让每套的产品切入角度、被处理物品状态和镜头组织不同。
          - 默认拍摄策略：产品/物品展示优先，淡化人物角色；除非补充要求明确需要人物剧情，不要设计专业模特、正脸表演或多人关系。
          - 人物处理：可用手部/手臂/背影/越肩视角完成开门、按键、取放、摆放、擦拭等操作；不要让人物成为画面主角。
          - 场景优先级：厨房电器优先写“产品 + 食材/餐具/台面/蒸汽/成品状态”的互动；冰箱/洗衣机/洗碗机等家电优先写“产品内部空间 + 被处理物品 + 使用前后结果”的可视化过程。
          - 表现手法必须落到产品可见动作和物品状态变化，不要只写“展示功能/突出卖点/产品特写”；每行至少包含一个产品本体或被处理物品的可拍动作、一个道具或环境细节、一个镜头处理。""".replace("\n          ", "\n")

          def checked_replace(text, old, new, path):
              if old not in text:
                  raise RuntimeError(f"Expected prompt fragment not found in {path}")
              return text.replace(old, new, 1)

          for filename in ("api_app.py", "app.py"):
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              text = checked_replace(text, role_old, role_new, filename)
              text = checked_replace(text, principles_old, principles_new, filename)
              text = checked_replace(text, extra_old, extra_new, filename)
              if filename == "api_app.py":
                  text = checked_replace(text, api_prompt_old, api_prompt_new, filename)
              else:
                  text = checked_replace(text, app_prompt_old, app_prompt_new, filename)
              path.write_text(text, encoding="utf-8")

          Path(".github/workflows/apply-product-first-prompt.yml").unlink(missing_ok=True)
          PY

      - name: Commit source patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api_app.py app.py .github/workflows/apply-product-first-prompt.yml
          if git diff --cached --quiet; then
            echo "No prompt changes to commit."
          else
            git commit -m "fix: make scripts product-focused for lightweight shooting"
            git push origin HEAD:main
          fi
